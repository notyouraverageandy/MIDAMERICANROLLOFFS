<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reservation Confirmed | Mid-American Roll Offs</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .status-container {
            max-width: 500px;
            margin: 100px auto;
            padding: var(--gap);
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            text-align: center;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.2);
        }
        .status-icon {
            width: 60px;
            height: 60px;
            background: rgba(19, 115, 51, 0.1);
            color: #137333;
            font-size: 2rem;
            line-height: 60px;
            border-radius: 50%;
            margin: 0 auto 20px auto;
            font-weight: bold;
        }
        .status-container h1 {
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 10px;
            color: var(--white);
        }
        .status-container p {
            color: var(--text-muted);
            font-size: 1rem;
            margin-bottom: 30px;
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
        }
    </style>
</head>
<body>

    <div class="status-container">
        <div class="status-icon">✓</div>
        <h1>Payment Securely Received</h1>
        <p>Your dumpster container reservation is officially locked into our schedule. Catherine will contact you via text or call shortly to finalize your exact residential delivery time window.</p>
        <a href="index.html" class="btn primary">Return to Dashboard</a>
    </div>

</body>
</html>
