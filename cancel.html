<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reservation Canceled | Mid-American Roll Offs</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .status-container {
            max-width: 500px;
            margin: 100px auto;
            padding: var(--gap);
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            text-align: center;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.2);
        }
        .status-icon {
            width: 60px;
            height: 60px;
            background: rgba(217, 35, 35, 0.1);
            color: var(--primary);
            font-size: 2rem;
            line-height: 60px;
            border-radius: 50%;
            margin: 0 auto 20px auto;
            font-weight: bold;
        }
        .status-container h1 {
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 10px;
            color: var(--white);
        }
        .status-container p {
            color: var(--text-muted);
            font-size: 1rem;
            margin-bottom: 30px;
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
        }
    </style>
</head>
<body>

    <div class="status-container">
        <div class="status-icon">✕</div>
        <h1>Reservation Canceled</h1>
        <p>Your secure payment window session was terminated. No financial transactions or card charges were processed. If you ran into unexpected terminal bugs, please call us directly to secure your slot.</p>
        <a href="index.html" class="btn primary">Try Booking Again</a>
    </div>

</body>
</html>
